[pytest]
# ── Glossary Library – Test Configuration ───────────────────────────────────────

# Default options: verbose, short tracebacks, preserved colour output
addopts =
    -v
    --tb=short
    --color=yes
    -p no:warnings

# Only look for tests in the tests/ directory
testpaths = tests

# Test file naming pattern
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Display test IDs cleanly
console_output_style = progress
